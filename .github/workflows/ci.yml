name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Block generated artifacts and local tooling
        shell: bash
        run: |
          set -euo pipefail
          tracked="$(git ls-files \
            'data/**' \
            'output/**' \
            'tools/**' \
            'ui/dist/**' \
            'deploy/databricks/artifacts/**' \
            'tmp_*.py')"

          if [[ -n "$tracked" ]]; then
            echo "Generated or local-only files are tracked:"
            echo "$tracked"
            exit 1
          fi

      - name: Scan for committed secrets
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          ignored_dirs = {
              ".git",
              ".venv",
              "venv",
              "env",
              "node_modules",
              "dist",
              "data",
              "output",
              "tools",
              "__pycache__",
          }
          ignored_path_parts = {
              ("deploy", "databricks", "artifacts"),
              ("ui", "node_modules"),
              ("ui", "dist"),
          }
          patterns = {
              "Databricks PAT": re.compile(r"\bdapi[a-f0-9]{24,}\b", re.IGNORECASE),
              "OpenAI API key": re.compile(r"\bsk-[A-Za-z0-9_-]{20,}\b"),
              "AWS access key": re.compile(r"\bAKIA[0-9A-Z]{16}\b"),
              "Private key": re.compile(r"-----BEGIN (?:RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----"),
          }

          root = Path(".").resolve()
          findings = []

          for path in root.rglob("*"):
              if not path.is_file():
                  continue

              relative = path.relative_to(root)
              parts = relative.parts

              if any(part in ignored_dirs for part in parts):
                  continue
              if any(tuple(parts[: len(prefix)]) == prefix for prefix in ignored_path_parts):
                  continue

              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue

              for label, pattern in patterns.items():
                  for match in pattern.finditer(text):
                      line = text.count("\n", 0, match.start()) + 1
                      findings.append(f"{relative}:{line}: {label}")

          if findings:
              print("Potential committed secrets found:")
              print("\n".join(findings))
              sys.exit(1)
          PY

  python:
    name: Python backend and engine
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: repository-hygiene
    env:
      PYTHONPATH: ${{ github.workspace }}
      APP_ENV: test
      RAG_DATA_ROOT: data
      RAG_OUTPUT_ROOT: output
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python modules
        run: |
          python -m compileall -q app backend engine deploy scripts streamlit_app.py sitecustomize.py

      - name: Validate split-package imports
        run: |
          python - <<'PY'
          import importlib

          modules = [
              "app.api.main",
              "app.config",
              "app.rag.answer",
              "app.rag.retriever",
              "app.clients.lancedb_store",
              "app.services.chunk_document",
              "app.security.guardrails",
          ]

          for module in modules:
              importlib.import_module(module)
              print(f"import ok: {module}")
          PY

      - name: Run engine smoke test
        run: |
          python tests/tmp_normalize_check.py
          python tests/quality_enrichment_smoke.py
          python tests/question_preparation_smoke.py
          python tests/video_source_resolution_smoke.py

  frontend:
    name: UI production build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: repository-hygiene
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build
